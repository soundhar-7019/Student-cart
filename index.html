<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student CRUD App</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        display: flex;
        justify-content: center;
        padding: 40px;
      }

      .container {
        width: 500px;
        background-color: white;
        padding: 20px;
        border-radius: 10px;
      }

      h1 {
        text-align: center;
        margin-bottom: 20px;
      }

      form {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      input {
        padding: 10px;
        border: 1px solid gray;
        border-radius: 5px;
      }

      button {
        padding: 10px;
        border: none;
        border-radius: 5px;
        color: white;
        cursor: pointer;
      }

      .add-btn {
        background-color: black;
      }

      .student-card {
        background-color: #eee;
        padding: 15px;
        margin-top: 15px;
        border-radius: 8px;
      }

      .student-card h3 {
        margin-bottom: 5px;
      }

      .btn-group {
        display: flex;
        gap: 10px;
        margin-top: 10px;
      }

      .edit-btn {
        background-color: orange;
      }

      .delete-btn {
        background-color: red;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Student Management</h1>

      <!-- FORM -->

      <form id="studentForm">
        <input type="text" id="name" placeholder="Enter Name" required />

        <input type="number" id="age" placeholder="Enter Age" required />

        <input type="text" id="course" placeholder="Enter Course" required />

        <input type="email" id="email" placeholder="Enter Email" required />

        <button type="submit" class="add-btn" id="submitBtn">
          Add Student
        </button>
      </form>

      <!-- STUDENT LIST -->

      <div id="studentList"></div>
    </div>

    <script>
      const API = "http://localhost:3000/students";

      const form = document.getElementById("studentForm");

      const studentList = document.getElementById("studentList");

      const submitBtn = document.getElementById("submitBtn");

      let editId = null;

      /* ================= GET ALL STUDENTS ================= */

      async function getStudents() {
        try {
          const response = await fetch(API);

          const students = await response.json();

          studentList.innerHTML = "";

          students.forEach((student) => {
            studentList.innerHTML += `

            <div class="student-card">

              <h3>${student.name}</h3>

              <p><strong>Age:</strong> ${student.age}</p>

              <p><strong>Course:</strong> ${student.course}</p>

              <p><strong>Email:</strong> ${student.email}</p>

              <div class="btn-group">

                <button 
                  class="edit-btn"
                  onclick="editStudent(
                    '${student._id}',
                    '${student.name}',
                    '${student.age}',
                    '${student.course}',
                    '${student.email}'
                  )"
                >
                  Edit
                </button>

                <button 
                  class="delete-btn"
                  onclick="deleteStudent('${student._id}')"
                >
                  Delete
                </button>

              </div>

            </div>

          `;
          });
        } catch (error) {
          console.log(error);
        }
      }

      /* ================= ADD / UPDATE STUDENT ================= */

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const studentData = {
          name: document.getElementById("name").value,

          age: document.getElementById("age").value,

          course: document.getElementById("course").value,

          email: document.getElementById("email").value,
        };

        try {
          /* ===== UPDATE ===== */

          if (editId) {
            await fetch(`${API}/${editId}`, {
              method: "PUT",

              headers: {
                "Content-Type": "application/json",
              },

              body: JSON.stringify(studentData),
            });

            submitBtn.innerText = "Add Student";

            editId = null;
          } else {

          /* ===== CREATE ===== */
            await fetch(API, {
              method: "POST",

              headers: {
                "Content-Type": "application/json",
              },

              body: JSON.stringify(studentData),
            });
          }

          form.reset();

          getStudents();
        } catch (error) {
          console.log(error);
        }
      });

      /* ================= EDIT STUDENT ================= */

      function editStudent(id, name, age, course, email) {
        document.getElementById("name").value = name;

        document.getElementById("age").value = age;

        document.getElementById("course").value = course;

        document.getElementById("email").value = email;

        editId = id;

        submitBtn.innerText = "Update Student";
      }

      /* ================= DELETE STUDENT ================= */

      async function deleteStudent(id) {
        try {
          await fetch(`${API}/${id}`, {
            method: "DELETE",
          });

          getStudents();
        } catch (error) {
          console.log(error);
        }
      }

      /* ================= LOAD STUDENTS ================= */

      getStudents();
    </script>
  </body>
</html>
